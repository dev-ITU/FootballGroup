services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12

  web:
    build: .
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    env_file:
      - .env
    environment:
      DJANGO_RUN_BOOTSTRAP: "1"
    volumes:
      - .:/app
      - webapp_node_modules:/app/webapp/node_modules
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
    build:
      context: .
      dockerfile: infra/nginx/Dockerfile
    env_file:
      - .env
    depends_on:
      web:
        condition: service_started
    ports:
      - "8000:8000"
      - "443:443"
    volumes:
      - nginx_certs:/etc/nginx/certs

  celery:
    build: .
    command: celery -A config worker -l info
    env_file:
      - .env
    environment:
      DJANGO_RUN_BOOTSTRAP: "0"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  celery-beat:
    build: .
    command: celery -A config beat -l info
    env_file:
      - .env
    environment:
      DJANGO_RUN_BOOTSTRAP: "0"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  redis:
    image: redis:7-alpine
    expose:
      - "6379"

volumes:
  postgres_data:
  webapp_node_modules:
  nginx_certs:
